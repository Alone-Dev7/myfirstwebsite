<!DOCTYPE html>
<html>
   <head>

<style>
   input{
      display: block;
      margin-top: 5px;
   }

   .feedback{
      vertical-align: middle;
      display: inline-block;
      width: 200px;
   }

   .options{
      vertical-align: middle;
   }

   .logo{
      display: block;
      margin-left: auto;
      margin-right: auto;
      margin-top: 100px;
      width: 231px; 
   }

   .search-bar{
      margin-top: 10px;
      border: none;
      width: 431px;
      margin-left: auto;
      margin-right: auto;
      display: block;
      border-radius: 31px;
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: 10px;
      padding-top: 10px;
      box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.25);
   }
   .search-bar:active{
      border: none;
      border-width: 0px;
   }
</style>

   </head>
   <body>

      <input type="text" placeholder="Name">
      <input type="text" placeholder="E-mail">
      <p class="feedback" >
         Thanks for chatting with our costumer support. Would you like to take our quick survey?
      </p>

      <button class="options">
         Yes
      </button>
      
      <button class="options">
         No
      </button>
      
      <img src="google.png" class="logo">
   
      <input type="text" placeholder="Search Google or type a URL " class="search-bar">
   
   
   </body>

</html>
